<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>订单详情</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">📄 订单详情</div>
        <table class="table" style="width:50%;">
            <tr><th>订单号</th><td th:text="${order.orderNo}"></td></tr>
            <tr><th>车牌号</th><td th:text="${order.plateNumber}"></td></tr>
            <tr><th>用户ID</th><td th:text="${order.userId}"></td></tr>
            <tr><th>总金额</th><td th:text="${order.totalAmount}"></td></tr>
            <tr><th>已付金额</th><td th:text="${order.paidAmount}"></td></tr>
            <tr><th>状态</th><td th:text="${order.status}"></td></tr>
            <tr><th>创建时间</th><td th:text="${createTimeStr}"></td></tr>
        </table>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <a th:href="@{/order/list}" class="btn btn-secondary">返回</a>
            <a th:if="${order.status == 'unpaid'}" th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-success">去支付</a>
        </div>
    </div>
</div>
</body>
</html>
