<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <h2>🅿️ 停车场管理系统</h2>
            <p>商场智慧停车管理平台</p>
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label for="userType">用户类型</label>
                <select id="userType" name="userType" class="form-control" required>
                    <option value="user">普通用户</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-login">登录</button>
            <div th:if="${param.error}" class="error-msg">用户名或密码错误，请重试</div>
            <div th:if="${param.registered}" class="error-msg" style="color:#52c41a;">注册成功，请登录</div>
            <div style="text-align: center; margin-top: 15px;">
                <a th:href="@{/register}">还没有账号？立即注册</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
