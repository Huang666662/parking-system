<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <h2>🅿️ 停车场管理系统</h2>
            <p>用户注册</p>
        </div>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label for="plateNumber">车牌号（选填）</label>
                <input type="text" id="plateNumber" name="plateNumber" class="form-control" placeholder="请输入车牌号">
            </div>
            <button type="submit" class="btn btn-primary btn-login">注册</button>
            <div th:if="${param.error}" class="error-msg">注册失败，请重试</div>
            <div style="text-align: center; margin-top: 15px;">
                <a th:href="@{/login}">已有账号？去登录</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
