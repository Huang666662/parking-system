<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>预约车位</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">📅 预约车位</div>
        <form th:action="@{/reservation/add}" method="post">
            <div class="form-group">
                <label>车牌号</label>
                <input type="text" name="plateNumber" class="form-control" required>
            </div>
            <div class="form-group">
                <label>车位ID</label>
                <input type="number" name="spaceId" class="form-control" required>
            </div>
            <div class="form-group">
                <label>预约时间</label>
                <input type="datetime-local" name="reserveTime" class="form-control" required>
            </div>
            <div class="form-group">
                <label>保证金（元）</label>
                <input type="number" step="0.01" name="depositAmount" class="form-control" value="10.00" required>
            </div>
            <button type="submit" class="btn btn-primary">提交预约</button>
            <a th:href="@{/reservation/list}" class="btn">返回</a>
        </form>
    </div>
</div>
</body>
</html>
