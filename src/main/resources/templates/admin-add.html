<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>新增管理员</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">➕ 新增管理员</div>
        <form th:action="@{/admin/add}" method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>角色</label>
                <select name="role" class="form-control" required>
                    <option value="super_admin">超级管理员</option>
                    <option value="system_admin">系统管理员</option>
                    <option value="space_admin">车位管理员</option>
                    <option value="finance_admin">财务管理员</option>
                    <option value="cashier">收费员</option>
                    <option value="customer_service">客服人员</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/admin/list}" class="btn">返回</a>
        </form>
    </div>
</div>
</body>
</html>
