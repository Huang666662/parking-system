<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>个人信息</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">👤 个人信息</div>
        <form th:action="@{/profile/update}" method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" th:value="${user.username}" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" name="phone" th:value="${user.phone}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>新密码（留空则不修改）</label>
                <input type="password" name="password" class="form-control">
            </div>
            <div th:if="${param.success}" class="success-msg" style="color:green; margin-bottom:10px;">修改成功</div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
</body>
</html>
