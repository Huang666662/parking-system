<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>系统账号管理</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">👤 系统账号管理</div>
        <div style="margin-bottom:15px;">
            <a th:href="@{/admin/add}" class="btn btn-primary">新增管理员</a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th>编号</th>
                <th>用户名</th>
                <th>角色</th>
                <th>状态</th>
                <th>最后登录</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${admins}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.username}"></td>
                <td th:text="${a.role}"></td>
                <td th:text="${a.status == 1 ? '正常' : '禁用'}"></td>
                <td th:text="${a.lastLoginTime}"></td>
                <td>
                    <form th:action="@{/admin/reset-password}" method="post" style="display:inline;">
                        <input type="hidden" name="id" th:value="${a.id}">
                        <input type="text" name="newPassword" placeholder="新密码" class="form-control" style="width:120px; display:inline;" required>
                        <button type="submit" class="btn btn-warning">重置密码</button>
                    </form>
                    <a th:href="@{/admin/delete/{id}(id=${a.id})}" class="btn btn-danger" onclick="return confirm('确认删除？')">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
