<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>新增车位</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">➕ 新增车位</div>
        <form th:action="@{/parking-space/add}" method="post">
            <div class="form-group">
                <label for="spaceNumber">车位编号</label>
                <input type="text" id="spaceNumber" name="spaceNumber" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="spaceName">车位名称</label>
                <input type="text" id="spaceName" name="spaceName" class="form-control">
            </div>
            <div class="form-group">
                <label for="areaId">区域编号</label>
                <input type="number" id="areaId" name="areaId" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="spaceTypeId">车位类型</label>
                <input type="number" id="spaceTypeId" name="spaceTypeId" class="form-control" value="1">
            </div>
            <div class="form-group">
                <label for="status">状态</label>
                <select id="status" name="status" class="form-control">
                    <option value="free">空闲</option>
                    <option value="occupied">占用</option>
                    <option value="locked">锁定</option>
                </select>
            </div>
            <div class="form-group">
                <label for="locationDesc">位置描述</label>
                <input type="text" id="locationDesc" name="locationDesc" class="form-control">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="isEnabled" value="1" checked> 启用此车位
                </label>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/parking-space/list}" class="btn btn-warning">返回</a>
        </form>
    </div>
</div>
</body>
</html>
