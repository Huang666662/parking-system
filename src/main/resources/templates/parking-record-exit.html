<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>车辆出场</title>
    <style>
        .fee-preview { background: #fafafa; border-radius: 8px; padding: 16px; margin: 16px 0; }
        .fee-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
        .fee-row.total { border-top: 1px solid #e8e8e8; margin-top: 6px; padding-top: 10px; font-size: 18px; font-weight: 700; color: #ff4d4f; }
        .fee-row .label { color: #666; }
        .fee-row .value { font-weight: 600; }
        .lookup-error { padding: 12px; background: #fff1f0; border: 1px solid #ffccc7; border-radius: 6px; color: #a8071a; margin-bottom: 12px; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">🚙 车辆出场</div>
        <div style="margin-bottom:15px;">
            <a th:href="@{/parking-record/list}" class="btn btn-primary">返回记录列表</a>
        </div>

        <div th:if="${lookupError != null}" class="lookup-error" th:text="${lookupError}"></div>

        <!-- 费用预览与确认出场 -->
        <div th:if="${record != null}" style="margin-bottom:30px;">
            <div class="fee-preview">
                <h4 style="margin-bottom:12px;">出场费用确认</h4>
                <div class="fee-row"><span class="label">车牌号</span><span class="value" th:text="${record.plateNumber}"></span></div>
                <div class="fee-row"><span class="label">入场时间</span><span class="value" th:text="${enterTimeStr}"></span></div>
                <div class="fee-row"><span class="label">停车时长</span><span class="value" th:text="${durationMinutes} + ' 分钟'"></span></div>
                <div class="fee-row"><span class="label">原始费用</span><span class="value">¥<span th:text="${originalFee}"></span></span></div>
                <div class="fee-row" th:if="${discountFee > 0}">
                    <span class="label">会员折扣</span>
                    <span class="value" style="color:#52c41a;">
                        -¥<span th:text="${discountFee}"></span>
                        <span th:if="${memberLevelName != null}" th:text="'(' + ${memberLevelName} + ')'"></span>
                    </span>
                </div>
                <div class="fee-row total"><span class="label">实付金额</span><span class="value">¥<span th:text="${actualFee}"></span></span></div>
            </div>

            <form th:action="@{/parking-record/exit}" method="post">
                <input type="hidden" name="recordId" th:value="${record.id}">
                <div class="form-group">
                    <label for="paymentMethod">支付方式</label>
                    <select id="paymentMethod" name="paymentMethod" class="form-control">
                        <option value="wechat">微信支付</option>
                        <option value="alipay">支付宝</option>
                        <option value="cash">现金</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-warning">确认出场并支付</button>
            </form>
        </div>

        <!-- 当前在场车辆列表 -->
        <div class="card-title" style="font-size:16px;">📋 当前在场车辆</div>
        <table class="table">
            <thead>
            <tr>
                <th>记录编号</th>
                <th>车牌号</th>
                <th>入场时间</th>
                <th>已停时长</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${parkingList}">
                <td th:text="${p.recordNo}"></td>
                <td th:text="${p.plateNumber}"></td>
                <td th:text="${p.enterTimeStr}"></td>
                <td th:text="${p.durationMinutes} + ' 分钟'"></td>
                <td>
                    <a th:href="@{/parking-record/exit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">出场</a>
                </td>
            </tr>
            <tr th:if="${parkingList == null or parkingList.empty}">
                <td colspan="5" style="text-align:center; color:#999;">当前无在场车辆</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
