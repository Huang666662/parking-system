<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>编辑车位</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-title">✏️ 编辑车位</div>
        <form th:action="@{/parking-space/update}" method="post">
            <input type="hidden" name="id" th:value="${space.id}">
            <div class="form-group">
                <label>车位编号</label>
                <input type="text" name="spaceNumber" class="form-control" th:value="${space.spaceNumber}" required>
            </div>
            <div class="form-group">
                <label>车位名称</label>
                <input type="text" name="spaceName" class="form-control" th:value="${space.spaceName}">
            </div>
            <div class="form-group">
                <label>区域编号</label>
                <input type="number" name="areaId" class="form-control" th:value="${space.areaId}" required>
            </div>
            <div class="form-group">
                <label>车位类型</label>
                <input type="number" name="spaceTypeId" class="form-control" th:value="${space.spaceTypeId}">
            </div>
            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="free" th:selected="${space.status == 'free'}">空闲</option>
                    <option value="occupied" th:selected="${space.status == 'occupied'}">占用</option>
                    <option value="locked" th:selected="${space.status == 'locked'}">锁定</option>
                </select>
            </div>
            <div class="form-group">
                <label>位置描述</label>
                <input type="text" name="locationDesc" class="form-control" th:value="${space.locationDesc}">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="isEnabled" value="1" th:checked="${space.isEnabled == 1}"> 启用此车位
                </label>
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a th:href="@{/parking-space/list}" class="btn btn-warning">返回</a>
        </form>
    </div>
</div>
</body>
</html>
